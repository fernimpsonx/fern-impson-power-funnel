<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fern Impson | Mind, Heart & Body Coach</title>
    <style>
        body { margin: 0; padding: 0; }
        #app { width: 100%; }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
        // Store all page content
        const pages = {};
        
        // Load page content from files
        async function loadPages() {
            const pageFiles = {
                'links': 'links.html',
                'affirmations': 'affirmations.html',
                'letsgrowtogether': 'letsgrowtogether.html',
                'thankyou': 'thankyou.html'
            };
            
            for (const [name, file] of Object.entries(pageFiles)) {
                try {
                    const response = await fetch(file);
                    pages[name] = await response.text();
                } catch (e) {
                    console.error(`Failed to load ${file}:`, e);
                }
            }
        }
        
        // Extract body content from HTML
        function extractBodyContent(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            return doc.body.innerHTML;
        }
        
        // Route handler
        function route() {
            const path = window.location.pathname;
            const app = document.getElementById('app');
            
            let pageName = 'links'; // default
            
            if (path === '/' || path === '') {
                pageName = 'links';
            } else if (path === '/affirmations' || path === '/affirmations/') {
                pageName = 'affirmations';
            } else if (path === '/letsgrowtogether' || path === '/letsgrowtogether/') {
                pageName = 'letsgrowtogether';
            } else if (path === '/thankyou' || path === '/thankyou/') {
                pageName = 'thankyou';
            }
            
            if (pages[pageName]) {
                app.innerHTML = extractBodyContent(pages[pageName]);
            } else {
                app.innerHTML = '<h1>Page not found</h1>';
            }
        }
        
        // Handle navigation
        window.addEventListener('popstate', route);
        
        // Initialize
        loadPages().then(() => {
            route();
        });
    </script>
</body>
</html>
