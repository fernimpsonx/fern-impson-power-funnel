<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Fern Impson</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Jost', sans-serif;
      background-color: #F2E5DE;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 480px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 400;
      color: #2F2F2F;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: #2F2F2F;
      line-height: 1.8;
      margin-bottom: 32px;
      font-weight: 300;
    }

    a {
      display: inline-block;
      background-color: #8B3A3A;
      color: #F2E5DE;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    a:hover {
      background-color: #6C403E;
      transform: translateY(-1px);
    }

    .signature {
      margin-top: 48px;
      font-size: 13px;
      color: #6C403E;
      font-style: italic;
    }
  </style>
</head>

  <div class="container">
